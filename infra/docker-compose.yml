# SmartChat stack — prod runs THIS file directly (no compose.prod.yml exists):
#   docker compose -f infra/docker-compose.yml --env-file .env …   (never omit --env-file)
name: smartchat

x-backend: &backend
  build:
    context: ..
    dockerfile: infra/backend.Dockerfile
  env_file: [../.env]
  depends_on:
    postgres: { condition: service_healthy }
    redis: { condition: service_started }
    minio: { condition: service_started }
  restart: unless-stopped

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: smartchat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartchat}
      POSTGRES_DB: smartchat
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartchat"]
      interval: 5s
      retries: 10
    ports: ["127.0.0.1:5433:5432"]

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --notify-keyspace-events Ex
    volumes: [redis-data:/data]
    ports: ["127.0.0.1:6380:6379"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-smartchat}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-smartchat-secret}
    volumes: [minio-data:/data]
    ports: ["127.0.0.1:9002:9000", "127.0.0.1:9003:9001"]

  api:
    <<: *backend
    command: uvicorn apps.api.app.main:app --host 0.0.0.0 --port 8000
    ports: ["127.0.0.1:8000:8000"]

  ws-gateway:
    <<: *backend
    command: uvicorn apps.api.app.realtime.gateway:app --host 0.0.0.0 --port 8001
    ports: ["127.0.0.1:8001:8001"]

  worker:
    <<: *backend
    command: arq apps.api.app.jobs.worker.WorkerSettings

  beat:
    <<: *backend
    command: python -m apps.api.app.jobs.beat

  flow-engine:
    <<: *backend
    command: python -m apps.flow_engine.runtime

  # 渠道入站 consumer — blocking tail on every ingress:{channel} stream so
  # webhook inbound (WhatsApp/Telegram/Meta/...) reaches the inbox within
  # milliseconds. Without it the only consumer is the worker's 15s drain cron
  # (= a visible 10-15s inbox delay). The cron stays as the safety net.
  channel-ingress:
    <<: *backend
    command: python -m apps.api.app.channels.ingress_consumer

  # AI 成員自動接待 consumer (group ai-agent on events:conversation) — replies
  # on handler=ai_agent conversations and pauses AI when a human interjects.
  ai-agent:
    <<: *backend
    command: python -m apps.api.app.ai.consumer

  edge:
    <<: *backend
    command: uvicorn apps.edge.main:app --host 0.0.0.0 --port 8002
    ports: ["127.0.0.1:8002:8002"]

  # Admin SPA served by nginx. The public edge (BaoTa) proxies "/" here and
  # routes /api,/ws,/hooks,/s,/js,/widget-app to the backend containers.
  web:
    build:
      context: ..
      dockerfile: infra/web.Dockerfile
    restart: unless-stopped
    ports: ["127.0.0.1:8080:80"]

  # bge-m3 embedding sidecar (P3 RAG embed tier). CPU-only; serves POST /embed
  # on :8090. Point the API/worker at it with EMBED_BASE_URL=http://embed:8090
  # (compose network); .env's localhost:8090 is for host-run dev only.
  embed:
    build:
      context: ..
      dockerfile: infra/embed.Dockerfile
    environment:
      EMBED_MODEL: BAAI/bge-m3
      EMBED_DEVICE: cpu
    volumes: [embed-models:/models]
    restart: unless-stopped
    ports: ["127.0.0.1:8090:8090"]

  # whatsmeow WhatsApp-App (personal-account) QR bridge. Manages every device
  # session in ONE process; the API/worker reach it at http://bridge-wa:8100 on
  # the compose network (set each account's config.bridge_url to that). Sessions
  # persist in the bridge-wa-data volume so pairings survive restarts.
  bridge-wa:
    build:
      context: ..
      dockerfile: infra/bridge-wa.Dockerfile
    environment:
      BRIDGE_API_TOKEN: ${BRIDGE_API_TOKEN:-}
      BRIDGE_STORE_DIR: /data
      BRIDGE_PUBLIC_URL: http://bridge-wa:8100
      SMARTCHAT_FILES_BASE: ${SMARTCHAT_FILES_BASE:-${ASSETS_BASE_URL:-}}
      BRIDGE_LOG_LEVEL: ${BRIDGE_LOG_LEVEL:-INFO}
    volumes: [bridge-wa-data:/data]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8100/healthz"]
      interval: 15s
      retries: 5
    ports: ["127.0.0.1:8100:8100"]

volumes:
  pg-data:
  redis-data:
  minio-data:
  embed-models:
  bridge-wa-data:
