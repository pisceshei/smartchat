# chat.chilling.com.hk — public edge reverse proxy (paste the location blocks
# into the BaoTa site's config, inside its existing SSL server{} block).
#
# Container ports are all bound to 127.0.0.1 by docker-compose:
#   web (SPA)      127.0.0.1:8080
#   api            127.0.0.1:8000   (REST /api, webhooks /hooks, widget /js /widget-app)
#   ws-gateway     127.0.0.1:8001   (WebSocket /ws, widget long-poll /widget)
#   edge           127.0.0.1:8002   (split-link short URLs /s)
#
# Reuse the existing Cloudflare Origin wildcard cert already on this box.
# Upload cap for media; long read timeout for SSE/long-poll.
client_max_body_size 25m;
proxy_read_timeout 90s;

# CRITICAL: BaoTa's GLOBAL /www/server/nginx/conf/proxy.conf enables a disk
# proxy cache (`proxy_cache cache_one`, inactive=1d) for EVERY proxied vhost.
# It silently kept serving STALE /js/ loaders and /widget-app assets after
# deploys (shops saw old widget behavior for up to an hour+). Opt this site
# out entirely — our responses carry their own Cache-Control.
proxy_cache off;

# --- REST API + OpenAPI ---
location /api/ {
    proxy_pass http://127.0.0.1:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# --- channel webhooks (Meta/Telegram/LINE/WeChat/bridge...) ---
location /hooks/ {
    proxy_pass http://127.0.0.1:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# --- widget loader (assets.../js/project_{key}.js) + iframe chat app ---
location /js/ {
    proxy_pass http://127.0.0.1:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}
location /widget-app {
    proxy_pass http://127.0.0.1:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}
# legacy chat-app path emitted by loaders cached before the /widget-app fix —
# the api serves /chat as an alias of /widget-app. ^~ so no regex rule can
# hijack /chat/assets/*.js.
location ^~ /chat/ {
    proxy_pass http://127.0.0.1:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# --- leftover Chatwoot embeds on merchant sites: neutralize instead of ---
# --- falling through to the SPA catch-all (which renders the LOGIN page) ---
# exact match only — the ws-gateway long-poll block /widget/ (trailing slash)
# still owns /widget/... subpaths.
location = /widget {
    default_type text/html;
    return 200 '<!doctype html><title></title>';
}
# old Chatwoot sdk.js — 204 = silent no-op script, no bubble drawn
location ^~ /packs/ {
    return 204;
}
# old Chatwoot ActionCable websocket — stop reconnect spam
location = /cable {
    return 204;
}

# --- realtime WebSocket gateway (agent + widget) ---
location /ws/ {
    proxy_pass http://127.0.0.1:8001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
}

# --- widget long-poll fallback (Cloudflare 100s ceiling; keep < that) ---
location /widget/ {
    proxy_pass http://127.0.0.1:8001;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
}

# --- split-link short URLs (edge redirector) ---
location /s/ {
    proxy_pass http://127.0.0.1:8002;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# --- admin SPA (must be LAST; catch-all) ---
location / {
    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}
