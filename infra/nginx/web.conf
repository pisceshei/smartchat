# SPA container nginx. Serves the admin app shell + hashed assets only.
# All API/WS/webhook/edge routing is done by the public edge (BaoTa nginx).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets are immutable — cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA history fallback: unknown paths return the shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must never be cached (points at hashed assets).
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
