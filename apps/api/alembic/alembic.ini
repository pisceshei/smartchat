# Run from repo root:  alembic -c apps/api/alembic/alembic.ini upgrade head
[alembic]
script_location = %(here)s
prepend_sys_path = %(here)s/../../..
# sqlalchemy.url is resolved in env.py (DATABASE_URL env var / app settings)
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
